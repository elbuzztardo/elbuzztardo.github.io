<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>El Buzztardo</title>
<meta name="description" content="El Buzztardo — Independent symbolic practice." />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0b;
  --fg:#eaeaea;
  --muted:rgba(234,234,234,.75);
  --faint:rgba(234,234,234,.55);
  --line:rgba(234,234,234,.16);
  --max:1100px;
  --pad:clamp(20px, 6vw, 90px);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family:'Space Grotesk', sans-serif;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

a{color:inherit;text-decoration:none}
a:focus{outline:2px solid rgba(234,234,234,.35);outline-offset:4px}

.wrap{
  max-width:var(--max);
  margin:0 auto;
  padding:0 var(--pad);
}

.section{
  padding:clamp(80px, 16vh, 180px) 0;
  border-top:1px solid var(--line);
}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:0 var(--pad);
}

.hero-inner{
  text-align:center;
  transform:translateY(-4vh);
}

.title{
  margin:0;
  font-weight:400;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-size:clamp(44px, 7vw, 100px);
  line-height:1.05;
}

.subtitle{
  margin: 56px 0 0;
  font-size:clamp(16px, 1.4vw, 19px);
  color:var(--muted);
}

.cta{
  display:inline-block;
  margin-top:96px;
  font-size:clamp(16px, 1.4vw, 19px);
  border-bottom:1px solid var(--line);
  padding-bottom:6px;
  opacity:.9;
  transition:opacity .3s ease;
}

.cta:hover{opacity:.7}

/* ART */
.art{
  padding-top:clamp(120px, 20vh, 220px);
}

.art-img{
  width:100%;
  display:block;
}

.art-meta{
  margin-top:24px;
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.art-meta span{
  display:block;
}

.art-meta span:first-child{
  color:var(--muted);
}

.art-meta span:last-child{
  color:var(--faint);
  margin-top:6px;
}

/* ARCHIVE */
.archive h2{
  margin:0;
  font-weight:400;
  letter-spacing:.04em;
  font-size:clamp(28px, 3.5vw, 42px);
}

.archive p{
  margin:28px 0 0;
  max-width:540px;
  font-size:clamp(15px, 1.3vw, 17px);
  color:var(--muted);
}

.form{
  margin-top:64px;
  max-width:720px;
  display:flex;
  align-items:center;
  gap:28px;
}

.email{
  flex:1;
  height:52px;
  padding:0 18px;
  background:transparent;
  border:1px solid rgba(234,234,234,.25);
  color:var(--fg);
  font-size:15px;
  transition:border-color .3s ease;
}

.email:focus{
  outline:none;
  border-color:rgba(234,234,234,.45);
}

.btn{
  height:52px;
  padding:0 32px;
  background:transparent;
  border:1px solid rgba(234,234,234,.25);
  color:var(--fg);
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
  transition: all .35s ease;
}

.btn:hover{
  background:#D1BFBB;
  border-color:#D1BFBB;
  color:#000;

}
/* FOOTER */
footer{
  padding:clamp(100px, 18vh, 220px) 0 60px;
}

.foot{
  display:flex;
  gap:32px;
  font-size:13px;
  color:var(--faint);
}

.foot a{
  border-bottom:1px solid transparent;
  padding-bottom:4px;
  transition:border-color .3s ease;
}

.foot a:hover{
  border-color:var(--line);
}

/* FADE */
.fade{
  opacity:0;
  transition:opacity 1.4s ease;
}

.fade.visible{
  opacity:1;
}
  
</style>
</head>

<body>

<section class="hero">
  <div class="hero-inner">
    <h1 class="title">El Buzztardo</h1>
    <p class="subtitle">Independent symbolic practice.</p>
    <a class="cta" href="#archive">Join the Archive</a>
  </div>
</section>

<section class="section art fade">
  <div class="wrap">
    <img class="art-img" src="IMG_0877.JPG" alt="Artwork by El Buzztardo">
    <div class="art-meta">
      <span>Entry 01</span>
      <span>2026</span>
    </div>
  </div>
</section>

<section class="section archive fade" id="archive">
  <div class="wrap">
    <h2>The Archive</h2>
    <p>
      Direct access.<br>
      New works and limited editions.<br>
      No feed. No algorithm.
    </p>

    <form class="form" action="#" method="post" onsubmit="return false;">
      <input class="email" type="email" placeholder="Enter your email">
      <button class="btn" type="submit">Join</button>
    </form>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="foot">
      <a href="https://www.instagram.com/el_buzztardo" target="_blank">Instagram</a>
      <a href="mailto:hello@elbuzztardo.com">Contact</a>
    </div>
  </div>
</footer>

<script>
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
},{threshold:0.15});

document.querySelectorAll('.fade').forEach(el=>{
  observer.observe(el);
});
</script>

</body>
</html>
